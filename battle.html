<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字変 - バトル</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 100vw; height: 100dvh; overflow: hidden; font-family: sans-serif; background: #f5f0e8; }
.bg { position: fixed; inset: 0; background-image: url("images/battle_field.png"); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 0; }
.battle-screen { position: relative; z-index: 1; width: 100vw; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; }
.top-right-ui { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 10; }
.timer-box { background: rgba(0,0,0,0.65); color: #fff; font-size: 28px; font-weight: bold; padding: 6px 18px; border-radius: 12px; letter-spacing: 2px; border: 2px solid rgba(255,255,255,0.3); }
.timer-box.danger { color: #ff4444; border-color: #ff4444; animation: blink 0.5s infinite alternate; }
@keyframes blink { from { opacity:1; } to { opacity:0.4; } }
.score-box { background: rgba(0,0,0,0.65); color: #fff; font-size: 20px; font-weight: bold; padding: 6px 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.3); text-align: right; }
.score-box .label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.score-row { display: flex; gap: 14px; font-size: 22px; }
.score-player { color: #ffdd55; }
.score-cpu { color: #88ccff; }
.stock-box { background: rgba(0,0,0,0.5); color: #ddd; font-size: 13px; padding: 4px 12px; border-radius: 8px; text-align: right; letter-spacing: 3px; }
.stock-box .stock-label { font-size: 10px; color: #888; margin-bottom: 2px; }
.combo-display { position: absolute; top: 50%; right: 60px; transform: translateY(-50%); z-index: 10; text-align: center; transition: opacity 0.3s; }
.combo-display .combo-num { font-size: 48px; font-weight: bold; color: #fff; text-shadow: 0 0 12px #ff8800, 0 0 30px #ff4400, 2px 2px 4px #000; line-height: 1; }
.combo-display .combo-label { font-size: 13px; color: #ffcc66; text-shadow: 1px 1px 3px #000; letter-spacing: 2px; }
.combo-display.hidden { opacity: 0; }
.enemy-area { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 10px; width: 100%; }
.enemy-hand { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 100%; }
.player-area { display: flex; align-items: flex-end; justify-content: center; gap: 20px; padding-bottom: 10px; width: 100%; }
.player-hand { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 60vw; }
.yamafuda-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.yamafuda { width: 80px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); }
.yamafuda-count { font-size: 13px; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px #000; }
.turn-end-btn { width: 80px; height: 32px; background: #4b0000; color: #fff; font-size: 13px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, opacity 0.1s; box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
.turn-end-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
.turn-end-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.card { width: 90px; border-radius: 8px; transition: transform 0.15s, box-shadow 0.15s; filter: drop-shadow(1px 3px 5px rgba(0,0,0,0.4)); }
.card.playable { cursor: grab; }
.card.playable:hover { transform: translateY(-8px) scale(1.05); }
.card.not-playable { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.card.dragging { opacity: 0.4; }
.card-back { width: 80px; border-radius: 8px; filter: drop-shadow(1px 3px 5px rgba(0,0,0,0.4)); }
.battle-zone { display: flex; align-items: center; justify-content: center; flex: 1; position: relative; width: 100%; }
.battle-slot { width: 100px; height: 140px; border: 3px dashed rgba(255,255,255,0.4); border-radius: 12px; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; font-size: 13px; color: rgba(255,255,255,0.5); position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s; }
.battle-slot.drag-over { border-color: gold; background: rgba(255,215,0,0.2); }
.battle-slot.evolve-target { border-color: #ff88ff; background: rgba(255,100,255,0.15); }
.battle-slot img { width: 100%; height: 100%; object-fit: contain; border-radius: 9px; cursor: grab; }
.bench-slot { width: 70px; height: 100px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.3); transition: border-color 0.2s, background 0.2s; }
.bench-slot.drag-over { border-color: gold; background: rgba(255,215,0,0.2); }
.bench-slot.evolve-target { border-color: #ff88ff; background: rgba(255,100,255,0.15); }
.bench-slot img { width: 100%; border-radius: 6px; cursor: grab; }
.result-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 20px #000, 2px 2px 4px #000; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.result-popup.show { opacity: 1; }
.skill-panel { position: absolute; left: 50%; transform: translateX(-50%); bottom: 8px; display: flex; gap: 8px; z-index: 15; }
.skill-btn { padding: 6px 14px; border: none; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; background: rgba(255,200,0,0.9); color: #4b0000; box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: 0.1s; }
.skill-btn:active { transform: scale(0.93); }
.skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.skill-btn.used { background: rgba(150,150,150,0.7); color: #fff; }
.revive-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.revive-screen h3 { color: #fff; font-size: 22px; }
.revive-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 400px; }
.revive-card { width: 80px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: 0.15s; }
.revive-card:hover { border-color: gold; transform: scale(1.05); }
.gear-btn { position: fixed; top: 50%; transform: translateY(-50%); left: 10px; width: 60px; height: 60px; cursor: pointer; z-index: 1100; filter: brightness(0); }
.gear-btn:active { opacity: 0.7; }
.surrender-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 8px 24px; background: rgba(100,0,0,0.8); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; z-index: 50; display: none; }
.surrender-btn:active { opacity: 0.7; }
.pause-menu { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
.pause-box { background: #2b2b2b; padding: 30px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px; min-width: 250px; }
.pause-box button { height: 55px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; background: #4b0000; color: white; cursor: pointer; }

/* ===== アニメーション ===== */
@keyframes cardFlipIn {
  0%   { transform: rotateY(90deg) scale(0.8); opacity: 0; }
  60%  { transform: rotateY(-10deg) scale(1.05); opacity: 1; }
  100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
@keyframes cardSlideIn {
  0%   { transform: translateY(60px); }
  60%  { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}
.card-flip-in { animation: cardFlipIn 0.45s ease-out forwards; }
.card-slide-in { animation: cardSlideIn 0.35s ease-out; }

/* ===== スマホ向け縮小レイアウト ===== */
@media (max-width: 600px) {
  .battle-screen { padding: 8px; }

  .card { width: 52px; }
  .card-back { width: 46px; }
  .yamafuda { width: 44px; }
  .yamafuda-count { font-size: 10px; }

  .player-hand, .enemy-hand { gap: 4px; max-width: 58vw; }
  .player-area { gap: 6px; }

  .turn-end-btn { width: 48px; height: 24px; font-size: 9px; border-radius: 8px; }

  .battle-slot { width: 62px; height: 88px; border-width: 2px; border-radius: 8px; }
  .bench-slot { width: 42px; height: 60px; border-radius: 6px; }

  .top-right-ui { top: 8px; right: 8px; gap: 4px; }
  .timer-box { font-size: 16px; padding: 3px 10px; border-radius: 8px; }
  .score-box { font-size: 12px; padding: 4px 10px; border-radius: 8px; }
  .score-row { font-size: 13px; gap: 8px; }
  .score-box .label { font-size: 9px; }
  .stock-box { font-size: 9px; padding: 3px 8px; letter-spacing: 1px; }

  .combo-display { right: 20px; }
  .combo-display .combo-num { font-size: 28px; }
  .combo-display .combo-label { font-size: 9px; }

  .gear-btn { width: 40px; height: 40px; left: 6px; }
  .surrender-btn { padding: 5px 16px; font-size: 12px; bottom: 12px; }

  .skill-panel { bottom: 4px; gap: 4px; }
  .skill-btn { padding: 4px 8px; font-size: 10px; border-radius: 8px; }

  .revive-card { width: 56px; }
}

/* ===== 長押しメニュー（画像保存・コピー・共有）を無効化 ===== */
img, .card, .card-back, .battle-slot img, .bench-slot img, .revive-card {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
</style>
</head>

<script>

document.addEventListener('contextmenu', e => e.preventDefault());

// ===== スマホのタッチドラッグ対応 =====
(function() {
  if (!('ontouchstart' in window)) return;

  let draggingEl = null;
  let clone = null;
  let offsetX = 0, offsetY = 0;

  document.addEventListener('touchstart', function(e) {
    const target = e.target.closest('[draggable="true"]');
    if (!target) return;
    e.preventDefault();
    const touch = e.touches[0];
    draggingEl = target;
    offsetX = touch.clientX - target.getBoundingClientRect().left;
    offsetY = touch.clientY - target.getBoundingClientRect().top;

    clone = target.cloneNode(true);
    clone.style.position = 'fixed';
    clone.style.width = target.offsetWidth + 'px';
    clone.style.opacity = '0.8';
    clone.style.pointerEvents = 'none';
    clone.style.zIndex = '9999';
    clone.style.left = (touch.clientX - offsetX) + 'px';
    clone.style.top  = (touch.clientY - offsetY) + 'px';
    document.body.appendChild(clone);

    target.classList.add('dragging');

    const evt = new DragEvent('dragstart', { bubbles: true, cancelable: true });
    target.dispatchEvent(evt);
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!draggingEl) return;
    e.preventDefault();
    const touch = e.touches[0];

    if (clone) {
      clone.style.left = (touch.clientX - offsetX) + 'px';
      clone.style.top  = (touch.clientY - offsetY) + 'px';
    }

    clone.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    clone.style.display = '';
    if (el) {
      const over = new DragEvent('dragover', { bubbles: true, cancelable: true, clientX: touch.clientX, clientY: touch.clientY });
      el.dispatchEvent(over);
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!draggingEl) return;
    const touch = e.changedTouches[0];

    if (clone) { clone.remove(); clone = null; }
    draggingEl.classList.remove('dragging');

    const fakeClone = document.createElement('div');
    fakeClone.style.cssText = 'position:fixed;width:1px;height:1px;pointer-events:none;';
    document.body.appendChild(fakeClone);
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    fakeClone.remove();
    if (el) {
      const drop = new DragEvent('drop', { bubbles: true, cancelable: true, clientX: touch.clientX, clientY: touch.clientY });
      el.dispatchEvent(drop);
    }

    const end = new DragEvent('dragend', { bubbles: true });
    draggingEl.dispatchEvent(end);
    draggingEl = null;
  }, { passive: false });
})();

const ownedRaw = JSON.parse(localStorage.getItem("ownedCards")) || [];
const ownedCards = ownedRaw.map(o => cards.find(c => c.name === o.name)).filter(Boolean);
const playerDeckData = ownedCards.length > 0
  ? [...ownedCards].sort(() => Math.random() - 0.5)
  : [...cards].sort(() => Math.random() - 0.5).slice(0, 12);
let playerHand = [];
let playerDeckPile = [...playerDeckData];

function buildCpuDeck() {
  const difficulty = localStorage.getItem("difficulty");
  let pool;
  if (difficulty === "beginner") pool = cards.filter(c => c.rarity === "N");
  else if (difficulty === "middle") pool = cards.filter(c => c.rarity === "N" || c.rarity === "SSR");
  else pool = [...cards];
  return [...pool].sort(() => Math.random() - 0.5).slice(0, 12);
}
let cpuDeckPile = buildCpuDeck();
let cpuHand = [];

let playerScore = 0;
let cpuScore = 0;
let playerStock = [];
let combo = 0;
let timerValue = 70;
let timerInterval = null;
let playerBattleCard = null;
let cpuBattleCard = null;
let playerBench = [null, null, null];
let turnPhase = "select";
let dragInfo = null;

const typeWins = { "△": "□", "○": "△", "□": "○" };

function isEvolveCard(card) { return !!card.evolvesFrom; }
function getBattleCardName() { return playerBattleCard ? playerBattleCard.name : null; }
function getBenchCardName(i) { return playerBench[i] ? playerBench[i].name : null; }
function canEvolveOnBattle(card) { return isEvolveCard(card) && getBattleCardName() === card.evolvesFrom; }
function canEvolveOnBench(card, i) { return isEvolveCard(card) && getBenchCardName(i) === card.evolvesFrom; }

function isHandCardPlayable(card) {
  if (turnPhase !== "select") return false;
  if (!isEvolveCard(card)) return playerBattleCard === null || playerBench.includes(null);
  if (canEvolveOnBattle(card)) return true;
  for (let i = 0; i < 3; i++) { if (canEvolveOnBench(card, i)) return true; }
  return false;
}

function updateSlotHighlights() {
  const battleSlot = document.getElementById("playerBattleSlot");
  if (dragInfo && isEvolveCard(dragInfo.card) && canEvolveOnBattle(dragInfo.card)) battleSlot.classList.add("evolve-target");
  else battleSlot.classList.remove("evolve-target");
  for (let i = 0; i < 3; i++) {
    const benchSlot = document.getElementById("playerBench" + i);
    if (dragInfo && isEvolveCard(dragInfo.card) && canEvolveOnBench(dragInfo.card, i)) benchSlot.classList.add("evolve-target");
    else benchSlot.classList.remove("evolve-target");
  }
}

function clearSlotHighlights() {
  document.getElementById("playerBattleSlot").classList.remove("evolve-target");
  for (let i = 0; i < 3; i++) document.getElementById("playerBench" + i).classList.remove("evolve-target");
}

function drawCard(hand, pile) { if (pile.length > 0) hand.push(pile.shift()); }

function renderPlayerHand() {
  const handEl = document.getElementById("playerHand");
  handEl.innerHTML = "";
  playerHand.forEach((card, i) => {
    const img = document.createElement("img");
    img.src = "images/genshokugensho_cards/" + card.image;
    const playable = isHandCardPlayable(card);
    img.className = playable ? "card playable card-slide-in" : "card not-playable card-slide-in";
    img.style.animationDelay = (i * 0.06) + "s";
    img.draggable = playable;
    if (playable) {
      img.addEventListener("dragstart", () => {
        dragInfo = { from: "hand", index: i, card: card };
        setTimeout(() => { img.classList.add("dragging"); updateSlotHighlights(); }, 0);
      });
      img.addEventListener("dragend", () => { img.classList.remove("dragging"); clearSlotHighlights(); dragInfo = null; });
    }
    handEl.appendChild(img);
  });
}

function renderEnemyHand() {
  const handEl = document.getElementById("enemyHand");
  handEl.innerHTML = "";
  cpuHand.forEach((card) => {
    const img = document.createElement("img");
    if (revealEnemyHand) { img.src = "images/genshokugensho_cards/" + card.image; img.className = "card-back"; img.style.border = "2px solid gold"; }
    else { img.src = "images/yamafuda_cpu.png"; img.className = "card-back"; }
    handEl.appendChild(img);
  });
}

function renderPlayerBench() {
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById("playerBench" + i);
    slot.innerHTML = "";
    if (playerBench[i]) {
      const img = document.createElement("img");
      img.src = "images/genshokugensho_cards/" + playerBench[i].image;
      img.draggable = true;
      img.addEventListener("dragstart", () => { dragInfo = { from: "bench", index: i, card: playerBench[i] }; setTimeout(() => { img.classList.add("dragging"); updateSlotHighlights(); }, 0); });
      img.addEventListener("dragend", () => { img.classList.remove("dragging"); clearSlotHighlights(); dragInfo = null; });
      slot.appendChild(img);
    } else { slot.textContent = "ベンチ"; }
  }
}

function renderPlayerBattleSlot() {
  const slot = document.getElementById("playerBattleSlot");
  slot.innerHTML = "";
  if (playerBattleCard) {
    const img = document.createElement("img");
    img.src = "images/genshokugensho_cards/" + playerBattleCard.image;
    // URカードのみ回転アニメーション
    if (playerBattleCard.rarity === "UR") img.classList.add("card-flip-in");
    img.draggable = true;
    img.addEventListener("dragstart", () => { dragInfo = { from: "battle", index: -1, card: playerBattleCard }; setTimeout(() => { img.classList.add("dragging"); updateSlotHighlights(); }, 0); });
    img.addEventListener("dragend", () => { img.classList.remove("dragging"); clearSlotHighlights(); dragInfo = null; });
    slot.appendChild(img);
  } else { slot.textContent = "あなた"; }
}

function setupDropZones() {
  const battleSlot = document.getElementById("playerBattleSlot");
  battleSlot.addEventListener("dragover", (e) => {
    if (!dragInfo) return;
    const card = dragInfo.card;
    let allowed = false;
    if (dragInfo.from === "hand") allowed = (!isEvolveCard(card) && playerBattleCard === null) || (isEvolveCard(card) && canEvolveOnBattle(card));
    else if (dragInfo.from === "bench") allowed = playerBattleCard === null;
    if (allowed) { e.preventDefault(); battleSlot.classList.add("drag-over"); }
  });
  battleSlot.addEventListener("dragleave", () => battleSlot.classList.remove("drag-over"));
  battleSlot.addEventListener("drop", (e) => {
    e.preventDefault();
    battleSlot.classList.remove("drag-over");
    if (!dragInfo || turnPhase !== "select") return;
    const card = dragInfo.card;
    if (dragInfo.from === "hand") {
      if (isEvolveCard(card)) {
        if (!canEvolveOnBattle(card)) return;
        playerBattleCard = card;
        playerHand.splice(dragInfo.index, 1);
        renderPlayerBattleSlot(); renderPlayerHand();
        if (!cpuBattleCard) placeCpuCard();
        checkTurnEndBtn(); clearInterval(timerInterval); updateTimerDisplay();
        checkHonouSkill(playerBattleCard); renderSkillPanel();
      } else {
        if (playerBattleCard !== null) return;
        placeCardToBattle(card, "hand", dragInfo.index);
      }
    } else if (dragInfo.from === "bench") {
      if (playerBattleCard !== null) return;
      playerBattleCard = dragInfo.card;
      playerBench[dragInfo.index] = null;
      renderPlayerBattleSlot(); renderPlayerBench(); renderPlayerHand();
      placeCpuCard(); checkTurnEndBtn(); clearInterval(timerInterval); updateTimerDisplay();
    }
    dragInfo = null; clearSlotHighlights();
  });

  for (let i = 0; i < 3; i++) {
    const benchSlot = document.getElementById("playerBench" + i);
    const idx = i;
    benchSlot.addEventListener("dragover", (e) => {
      if (!dragInfo) return;
      const card = dragInfo.card;
      let allowed = false;
      if (dragInfo.from === "hand") { if (!isEvolveCard(card) && playerBench[idx] === null) allowed = true; if (isEvolveCard(card) && canEvolveOnBench(card, idx)) allowed = true; }
      else if (dragInfo.from === "battle") allowed = true;
      else if (dragInfo.from === "bench") { if (dragInfo.index !== idx) allowed = true; }
      if (allowed) { e.preventDefault(); benchSlot.classList.add("drag-over"); }
    });
    benchSlot.addEventListener("dragleave", () => benchSlot.classList.remove("drag-over"));
    benchSlot.addEventListener("drop", (e) => {
      e.preventDefault();
      benchSlot.classList.remove("drag-over");
      if (!dragInfo || turnPhase !== "select") return;
      const card = dragInfo.card;
      if (dragInfo.from === "hand") {
        if (isEvolveCard(card)) { if (!canEvolveOnBench(card, idx)) return; playerBench[idx] = card; playerHand.splice(dragInfo.index, 1); renderPlayerBench(); renderPlayerHand(); }
        else { if (playerBench[idx] !== null) return; playerBench[idx] = card; playerHand.splice(dragInfo.index, 1); renderPlayerHand(); renderPlayerBench(); }
      } else if (dragInfo.from === "battle") {
        if (isEvolveCard(card)) return;
        if (playerBench[idx] !== null) { const oldBench = playerBench[idx]; playerBench[idx] = playerBattleCard; playerBattleCard = oldBench; }
        else { playerBench[idx] = playerBattleCard; playerBattleCard = null; }
        renderPlayerBattleSlot(); renderPlayerBench(); renderPlayerHand(); checkTurnEndBtn();
      } else if (dragInfo.from === "bench") {
        if (dragInfo.index === idx) return;
        const temp = playerBench[idx]; playerBench[idx] = playerBench[dragInfo.index]; playerBench[dragInfo.index] = temp;
        renderPlayerBench();
      }
      dragInfo = null; clearSlotHighlights();
    });
  }
}

function placeCardToBattle(card, from, index) {
  if (playerBattleCard) return;
  playerBattleCard = card;
  if (from === "hand") { playerHand.splice(index, 1); renderPlayerHand(); }
  renderPlayerBattleSlot(); placeCpuCard(); checkTurnEndBtn(); clearInterval(timerInterval); updateTimerDisplay();
  checkHonouSkill(card); renderSkillPanel();
}

function checkTurnEndBtn() { document.getElementById("turnEndBtn").disabled = !playerBattleCard; }

function startTimer() {
  clearInterval(timerInterval);
  timerValue = 70;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerValue--;
    updateTimerDisplay();
    if (timerValue <= 0) {
      clearInterval(timerInterval);
      if (!playerBattleCard) {
        const playable = playerHand.filter(c => !isEvolveCard(c));
        if (playable.length > 0) placeCardToBattle(playable[0], "hand", playerHand.indexOf(playable[0]));
      }
    }
  }, 1000);
}

function updateTimerDisplay() { const box = document.getElementById("timerBox"); box.textContent = timerValue; box.classList.toggle("danger", timerValue <= 10); }
function updateScore() { document.getElementById("playerScore").textContent = playerScore; document.getElementById("cpuScore").textContent = cpuScore; }
function updateStock() { const el = document.getElementById("stockDisplay"); el.textContent = playerStock.length > 0 ? playerStock.join(" ") : "－"; }
function updateCombo() { const display = document.getElementById("comboDisplay"); document.getElementById("comboNum").textContent = combo; display.classList.toggle("hidden", combo === 0); }
function updateDeckCounts() { document.getElementById("playerDeckCount").textContent = playerDeckPile.length; document.getElementById("enemyDeckCount").textContent = cpuDeckPile.length; }

function placeCpuCard() {
  if (cpuHand.length === 0) return;
  const difficulty = localStorage.getItem("difficulty");
  const typeWinsMap = { "○": "□", "△": "○", "□": "△" };
  const typelosesMap = { "○": "△", "□": "○", "△": "□" };
  let pool = [...cpuHand.map((c, i) => ({ c, i }))];
  let index = 0;

  if (difficulty === "beginner") {
    const losingType = playerBattleCard ? typelosesMap[playerBattleCard.type] : null;
    const weakN = pool.filter(({ c }) => c.rarity === "N" && c.type === losingType);
    const allN = pool.filter(({ c }) => c.rarity === "N");
    if (weakN.length > 0) index = weakN[Math.floor(Math.random() * weakN.length)].i;
    else if (allN.length > 0) index = allN[Math.floor(Math.random() * allN.length)].i;
    else index = Math.floor(Math.random() * cpuHand.length);
  } else if (difficulty === "middle") {
    const ssrOrLower = pool.filter(({ c }) => c.rarity === "N" || c.rarity === "SSR");
    if (ssrOrLower.length > 0) index = ssrOrLower[Math.floor(Math.random() * ssrOrLower.length)].i;
    else index = Math.floor(Math.random() * cpuHand.length);
  } else if (difficulty === "advanced") {
    if (playerBattleCard && Math.random() < 0.5) {
      const winType = typeWinsMap[playerBattleCard.type];
      const winCards = pool.filter(({ c }) => c.type === winType);
      if (winCards.length > 0) index = winCards[Math.floor(Math.random() * winCards.length)].i;
      else index = Math.floor(Math.random() * cpuHand.length);
    } else index = Math.floor(Math.random() * cpuHand.length);
  } else if (difficulty === "master") {
    if (playerBattleCard) {
      const winType = typeWinsMap[playerBattleCard.type];
      const urWin = pool.filter(({ c }) => c.rarity === "UR" && c.type === winType);
      const anyWin = pool.filter(({ c }) => c.type === winType);
      if (urWin.length > 0) index = urWin[Math.floor(Math.random() * urWin.length)].i;
      else if (anyWin.length > 0) index = anyWin[Math.floor(Math.random() * anyWin.length)].i;
      else index = Math.floor(Math.random() * cpuHand.length);
    } else index = Math.floor(Math.random() * cpuHand.length);
  } else index = Math.floor(Math.random() * cpuHand.length);

  cpuBattleCard = cpuHand[index];
  cpuHand.splice(index, 1);
  renderEnemyHand();
  const slot = document.getElementById("enemyBattleSlot");
  slot.innerHTML = "";
  const img = document.createElement("img");
  img.src = "images/yamafuda_cpu.png";
  slot.appendChild(img);
  if (difficulty === "master" && cpuBattleCard && cpuBattleCard.skill) activateCpuSkill(cpuBattleCard);
}

function activateCpuSkill(card) {
  const skill = card.skill;
  if (!skill) return;
  if (skill === "draw_water") { const idx = cpuDeckPile.findIndex(c => c.bushu === "さんずい"); if (idx >= 0) cpuHand.push(cpuDeckPile.splice(idx, 1)[0]); }
  else if (skill === "draw_triangle") { const idx = cpuDeckPile.findIndex(c => c.type === "△"); if (idx >= 0) cpuHand.push(cpuDeckPile.splice(idx, 1)[0]); }
  else if (skill === "revive") { if (cpuGraveyard.length > 0) { const revived = cpuGraveyard.splice(0, 1)[0]; cpuHand.push(revived); } }
  updateDeckCounts(); renderEnemyHand();
}

function onTurnEnd() {
  if (!playerBattleCard || !cpuBattleCard) return;
  turnPhase = "revealed";
  document.getElementById("turnEndBtn").disabled = true;
  const playerSlot = document.getElementById("playerBattleSlot");
  playerSlot.innerHTML = "";
  const pImg = document.createElement("img");
  pImg.src = "images/genshokugensho_cards/" + playerBattleCard.image;
  playerSlot.appendChild(pImg);
  const enemySlot = document.getElementById("enemyBattleSlot");
  enemySlot.innerHTML = "";
  const cImg = document.createElement("img");
  cImg.src = "images/genshokugensho_cards/" + cpuBattleCard.image;
  enemySlot.appendChild(cImg);
  setTimeout(() => judgeResult(), 800);
}

function judgeResult() {
  const pType = playerBattleCard.type;
  const cType = cpuBattleCard.type;
  let result = "";
  if (pType === cType) result = "draw";
  else if (typeWins[pType] === cType) result = "win";
  else result = "lose";

  if (result === "win") {
    const gain = playerBattleCard.rarity === "UR" ? 2 : 1;
    playerScore += gain;
    playerStock.push(playerBattleCard.name);
    if (playerStock.length > 5) playerStock.shift();
    checkJukugo();
    showResultText("勝利！", "#ffdd55");
    checkMissionBattle();
    cpuGraveyard.push(cpuBattleCard);
  } else if (result === "lose") {
    const gain = cpuBattleCard.rarity === "UR" ? 2 : 1;
    cpuScore += gain;
    showResultText("敗北", "#88ccff");
    combo = 0;
    playerGraveyard.push(playerBattleCard);
  } else {
    if (honouSkillActive) { playerScore += 2; showResultText("引き分け！焱スキル+2pt", "#ff8800"); }
    else showResultText("引き分け", "#fff");
    honouSkillActive = false;
  }
  updateScore(); updateStock(); updateCombo();
  setTimeout(() => nextTurn(), 1500);
}

function checkJukugo() {
  const stockStr = playerStock.join("");
  for (const len of [4, 3, 2]) {
    if (len === 3 && combo < 2) continue;
    if (len === 4 && combo < 3) continue;
    for (const jukugo of jukugoList[len] || []) {
      if (stockStr.includes(jukugo)) {
        const points = len === 2 ? 1 : len === 3 ? 2 : 3;
        playerScore += points; combo++;
        const used = jukugo.split("");
        used.forEach(char => { const idx = playerStock.indexOf(char); if (idx >= 0) playerStock.splice(idx, 1); });
        showResultText(`${jukugo}　+${points}点！`, "#ff8800");
        updateStock(); updateCombo(); updateScore();
        return;
      }
    }
  }
  combo = 0; updateCombo();
}

function showResultText(text, color) {
  const zone = document.querySelector(".battle-zone");
  const popup = document.createElement("div");
  popup.className = "result-popup";
  popup.textContent = text;
  popup.style.color = color;
  popup.style.position = "absolute";
  popup.style.fontSize = "40px";
  popup.style.fontWeight = "bold";
  popup.style.textShadow = "2px 2px 6px #000";
  popup.style.zIndex = "30";
  zone.appendChild(popup);
  setTimeout(() => popup.classList.add("show"), 50);
  setTimeout(() => { popup.classList.remove("show"); setTimeout(() => popup.remove(), 300); }, 1200);
}

function checkMissionBattle() {
  const today = new Date().toDateString();
  const data = JSON.parse(localStorage.getItem("mission")) || {};
  if (data.date !== today) return;
  if (data.login && !data.battle) {
    data.battle = true;
    localStorage.setItem("mission", JSON.stringify(data));
    if (!data.rewarded) {
      data.rewarded = true;
      localStorage.setItem("mission", JSON.stringify(data));
      const moji = parseInt(localStorage.getItem("tanzaku")) || 0;
      localStorage.setItem("tanzaku", moji + 20);
    }
  }
}

function showGameEnd() {
  clearInterval(timerInterval);
  const win = playerScore > cpuScore;
  const draw = playerScore === cpuScore;
  const title = document.getElementById("gameEndTitle");
  if (draw) { title.textContent = "引き分け"; title.style.color = "#fff"; }
  else if (win) { title.textContent = "あなたの勝利！"; title.style.color = "#ffdd55"; }
  else { title.textContent = "CPUの勝利"; title.style.color = "#88ccff"; }
  document.getElementById("gameEndPlayerScore").textContent = playerScore;
  document.getElementById("gameEndCpuScore").textContent = cpuScore;
  document.getElementById("gameEndScreen").style.display = "flex";
}

function nextTurn() {
  document.getElementById("playerBattleSlot").innerHTML = "あなた";
  document.getElementById("enemyBattleSlot").innerHTML = "相手";
  playerBattleCard = null; cpuBattleCard = null; turnPhase = "select";
  honouSkillActive = false; revealEnemyHand = false;
  document.getElementById("skillPanel").innerHTML = "";
  drawCard(playerHand, playerDeckPile);
  drawCard(cpuHand, cpuDeckPile);
  updateDeckCounts(); renderPlayerHand(); renderEnemyHand(); renderPlayerBench();
  updateScore(); checkTurnEndBtn(); renderSkillPanel();
  if (playerScore >= 12 || cpuScore >= 12) { setTimeout(() => showGameEnd(), 100); return; }
  const playerPlayable = playerHand.some(c => isHandCardPlayable(c));
  const playerNoCards = !playerPlayable && playerDeckPile.length === 0;
  const cpuNoCards = cpuHand.length === 0 && cpuDeckPile.length === 0;
  if (playerNoCards || cpuNoCards) { setTimeout(() => showGameEnd(), 100); return; }
  startTimer();
}

function onSurrender() {
  if (!confirm("降参しますか？")) return;
  clearInterval(timerInterval);
  showGameEnd();
}

function applySettings() {
  const showSurrender = localStorage.getItem("showSurrender") === "true";
  const btn = document.getElementById("surrenderBtn");
  if (btn) btn.style.display = showSurrender ? "block" : "none";
}

function openPauseMenu() { document.getElementById("pauseMenu").style.display = "flex"; }
function closePauseMenu() { document.getElementById("pauseMenu").style.display = "none"; }

function init() {
  for (let i = 0; i < 5; i++) { drawCard(playerHand, playerDeckPile); drawCard(cpuHand, cpuDeckPile); }
  renderPlayerHand(); renderEnemyHand(); renderPlayerBench();
  updateScore(); updateStock(); updateCombo(); updateDeckCounts();
  setupDropZones(); startTimer(); applySettings();
}

init();
</script>
</body>
</html>

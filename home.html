<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon.png">
<meta name="theme-color" content="#5b0000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字変 - ホーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  height: 100vh;
  overflow: hidden;
  font-family: sans-serif;
}
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #ffffff 0%, #ffffff 50%, #ff8640 100%);
  z-index: 0;
}
.container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 110px;
  z-index: 5;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0px;
  gap: 0px;
}
.top-home {
  width: 100%;
  max-width: 100%;
  height: 200px;
  object-fit: cover;
  object-position: center center;
  flex-shrink: 0;
  display: block;
}
.panel {
  width: 85%;
  max-width: 600px;
  background: white;
  border: 3px solid #222;
  border-radius: 25px;
  flex-shrink: 0;
  margin-top: 50px;
}

/* ガチャパネル */
.gacha-panel {
  height: 260px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: 0.15s;
  overflow: hidden;
  position: relative;
}
.gacha-panel:active { transform: scale(0.97); opacity: 0.85; }
.gacha-panel img { height: 180px; object-fit: contain; pointer-events: none; }
.gacha-panel .gacha-label {
  font-size: 22px;
  font-weight: bold;
  color: #4b0000;
  letter-spacing: 4px;
}

/* お知らせパネル */
.notice-panel {
  min-height: 150px;
  padding: 20px 25px;
}
.panel-title {
  font-size: 18px;
  font-weight: bold;
  color: #4b0000;
  border-bottom: 2px solid rgba(75,0,0,0.2);
  padding-bottom: 8px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}
.notice-item {
  font-size: 15px;
  color: #333;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}
.notice-item:last-child { border-bottom: none; }

/* スタンプラリーパネル */
.stamp-panel {
  padding: 20px 25px;
}
.stamp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 10px;
}
.stamp-cell {
  aspect-ratio: 1 / 1;
  border: 2px dashed #ccc;
  border-radius: 16px;
  background: #fafafa;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px;
  text-align: center;
  transition: 0.2s;
  position: relative;
  overflow: hidden;
}
.stamp-cell.done {
  border: 2px solid #4b0000;
  background: #fff8f0;
}
.stamp-img {
  width: 65%;
  height: 65%;
  object-fit: contain;
  filter: grayscale(100%);
  opacity: 0.35;
  transition: 0.2s;
}
.stamp-cell.done .stamp-img {
  filter: none;
  opacity: 1;
}
.stamp-name {
  font-size: 10.5px;
  color: #777;
  margin-top: 4px;
  line-height: 1.3;
}
.stamp-cell.done .stamp-name {
  color: #4b0000;
  font-weight: bold;
}
.stamp-progress {
  text-align: right;
  font-size: 13px;
  color: #4b0000;
  font-weight: bold;
  margin-top: 10px;
}

/* ===== スタンプが押される演出 ===== */
@keyframes stampPressImg {
  0%   { transform: scale(2.6) rotate(-18deg); opacity: 0; }
  35%  { transform: scale(0.8) rotate(8deg);  opacity: 1; }
  55%  { transform: scale(1.18) rotate(-5deg); }
  75%  { transform: scale(0.94) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes stampPressFlash {
  0%   { background: #ffe58a; }
  100% { background: #fff8f0; }
}
@keyframes stampPressRing {
  0%   { box-shadow: 0 0 0 0 rgba(255,180,0,0.55); }
  100% { box-shadow: 0 0 0 26px rgba(255,180,0,0); }
}
.stamp-cell.stamp-anim {
  animation: stampPressFlash 0.7s ease-out, stampPressRing 0.7s ease-out;
}
.stamp-cell.stamp-anim .stamp-img {
  animation: stampPressImg 0.55s cubic-bezier(.25,.9,.3,1.4);
}

/* ミッションパネル */
.mission-panel {
  padding: 20px 25px;
}
.mission-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}
.mission-item:last-child { border-bottom: none; }
.mission-name { color: #333; font-weight: bold; }
.mission-status {
  font-size: 13px;
  font-weight: bold;
  padding: 4px 12px;
  border-radius: 20px;
}
.mission-status.done { background: #4b0000; color: white; }
.mission-status.yet { background: #eee; color: #888; }
.mission-reward {
  font-size: 12px;
  color: #888;
  margin-top: 2px;
}

/* イベントパネル */
.event-panel {
  padding: 20px 25px;
  margin-bottom: 30px;
}
.event-item {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}
.event-item:last-child { border-bottom: none; }
.event-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 6px;
  margin-bottom: 4px;
}
.tag-gacha { background: #fff0cc; color: #886600; }
.tag-event { background: #e8f0ff; color: #334488; }
.tag-bonus { background: #e8ffe8; color: #226622; }
.event-title { font-size: 15px; font-weight: bold; color: #222; }
.event-period { font-size: 12px; color: #888; margin-top: 2px; }

.bottom-nav {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 110px;
  background: #5b0000;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
}
.nav-btn { width: 70px; cursor: pointer; transition: 0.08s; }
.nav-btn:active { transform: scale(0.88); }
.setting-btn {
  position: fixed;
  left: 10px;
  bottom: 140px;
  width: 100px;
  height: 100px;
  cursor: pointer;
  transition: 0.08s;
  background: none;
  border: none;
  z-index: 1100;
}
.setting-btn:active { transform: scale(0.88); }
</style>
</head>
<body>
<audio id="bgm" src="audio/bgm_main.mp3" loop></audio>
<audio id="seStamp" src="audio/se_stamp.mp3" preload="auto"></audio>
<div class="bg"></div>

<div class="container">
  <img src="images/top_home.png" class="top-home">

  <!-- ガチャパネル -->
  <div class="panel gacha-panel" onclick="location.href='gacha.html'">
    <img src="images/camera.png" style="height:100%;max-height:220px;object-fit:contain;pointer-events:none;">
    <span class="gacha-label">恒常ガチャ</span>
  </div>

  <!-- お知らせ -->
  <div class="panel notice-panel">
    <div class="panel-title">📢 お知らせ</div>
    <div class="notice-item">字変へようこそ！</div>
    <div class="notice-item">チュートリアル実装予定！</div>
    <div class="notice-item">今後カード追加予定！</div>
  </div>

  <!-- 初心者スタンプラリー -->
  <div class="panel stamp-panel">
    <div class="panel-title">🏆 はじめてスタンプラリー</div>
    <div class="stamp-grid" id="stampGrid"></div>
    <div class="stamp-progress" id="stampProgress"></div>
  </div>

  <!-- ミッション -->
  <div class="panel mission-panel">
    <div class="panel-title">📋 デイリーミッション</div>
    <div id="missionList"></div>
  </div>

  <!-- イベント -->
  <div class="panel event-panel">
    <div class="panel-title">🎉 イベント</div>
    <div id="eventList"></div>
  </div>

</div>

<div class="bottom-nav">
  <img src="images/btn_home.png"   class="nav-btn" onclick="location.href='home.html'">
  <img src="images/btn_gacha.png"  class="nav-btn" onclick="location.href='gacha.html'">
  <img src="images/btn_deck.png"   class="nav-btn" onclick="location.href='deck.html'">
  <img src="images/btn_battle.png" class="nav-btn" onclick="location.href='battle select.html'">
</div>

<img src="images/歯車.png" class="setting-btn" onclick="location.href='setting.html'" style="filter:brightness(0);">

<script src="js/audio.js"></script>
<script>

// ===== 初心者スタンプラリー =====
// スタンプは3x3の9個。imgは自作イラストのファイルパスに差し替えてください。
// 未達成時は自動でグレーアウト表示され、達成すると原色で表示されます。
//
// 他ページ(gacha.html, deck.html, battle.html, setting.html)で対応する
// ミッションを達成した際は、以下のように stampRally を更新してください。
//   const data = JSON.parse(localStorage.getItem("stampRally")) || {};
//   data.gacha1 = true;
//   localStorage.setItem("stampRally", JSON.stringify(data));

const STAMP_IMG = "stamp.png"; // 全マス共通のスタンプ画像（home.htmlと同じ階層に配置）

const stampMissions = [
  { id: "login1",   name: "はじめてログイン",   img: STAMP_IMG },
  { id: "gacha1",   name: "ガチャを1回引く",     img: STAMP_IMG },
  { id: "login3",   name: "3日連続ログイン",     img: STAMP_IMG },
  { id: "deckopen", name: "デッキ画面を開く",     img: STAMP_IMG },
  { id: "deckmake", name: "デッキを編成する",     img: STAMP_IMG },
  { id: "battle1",  name: "バトルに挑戦する",     img: STAMP_IMG },
  { id: "win1",     name: "バトルに勝利する",     img: STAMP_IMG },
  { id: "setting1", name: "設定画面を開く",       img: STAMP_IMG },
  { id: "login7",   name: "7日連続ログイン",     img: STAMP_IMG },
];

function getStampData() {
  return JSON.parse(localStorage.getItem("stampRally")) || {};
}

// スタンプを1個達成する。新規達成時のみ短冊+20枚（全達成なら+500枚も追加）を付与する。
// このブロックは home.html / gacha.html / deck.html / battle.html / setting.html で共通。
function markStamp(id) {
  const data = getStampData();
  if (!data[id]) {
    data[id] = true;
    localStorage.setItem("stampRally", JSON.stringify(data));
    grantStampReward(data);
  }
}

function grantStampReward(data) {
  const tanzaku = parseInt(localStorage.getItem("tanzaku")) || 0;
  localStorage.setItem("tanzaku", tanzaku + 20);
  showStampToast("スタンプ達成！ 願いの短冊+20枚");

  const allIds = ["login1","gacha1","login3","deckopen","deckmake","battle1","win1","setting1","login7"];
  const allDone = allIds.every(i => data[i]);
  if (allDone && localStorage.getItem("stampRallyCompleted") !== "true") {
    localStorage.setItem("stampRallyCompleted", "true");
    const t2 = parseInt(localStorage.getItem("tanzaku")) || 0;
    localStorage.setItem("tanzaku", t2 + 500);
    showStampToast("スタンプラリー全達成！ 願いの短冊+500枚");
  }
}

function showStampToast(msg) {
  const t = document.createElement("div");
  t.textContent = msg;
  t.style.cssText = "position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:15px;font-weight:bold;z-index:9999;opacity:0;transition:opacity .3s;";
  document.body.appendChild(t);
  requestAnimationFrame(() => t.style.opacity = "1");
  setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 2200);
}

// ===== スタンプが押される演出＋SE =====
// 「達成済みだがまだ演出を見せていないスタンプ」を stampSeen で管理し、
// ホーム画面を開いた時にまとめて1つずつ演出＋SEを再生する。
function getSeenStamps() {
  return JSON.parse(localStorage.getItem("stampSeen")) || {};
}
function markStampSeen(id) {
  const seen = getSeenStamps();
  seen[id] = true;
  localStorage.setItem("stampSeen", JSON.stringify(seen));
}
// この機能を導入する前から既に達成していたスタンプは、
// 初回だけ「演出なしで既読扱い」にしてまとめて光らないようにする。
function initStampSeenIfNeeded() {
  if (localStorage.getItem("stampSeen") === null) {
    localStorage.setItem("stampSeen", JSON.stringify(getStampData()));
  }
}
function playStampSE() {
  const se = document.getElementById("seStamp");
  if (!se) return;
  try {
    se.currentTime = 0;
    se.play().catch(() => {});
  } catch (e) {}
}

// ホームを開いたら「はじめてログイン」と連続ログイン日数を自動更新
function updateLoginStamp() {
  markStamp("login1");

  const today = new Date().toDateString();
  const streak = JSON.parse(localStorage.getItem("loginStreak")) || { lastDate: null, count: 0 };

  if (streak.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    streak.count = (streak.lastDate === yesterday) ? streak.count + 1 : 1;
    streak.lastDate = today;
    localStorage.setItem("loginStreak", JSON.stringify(streak));
  }

  if (streak.count >= 3) markStamp("login3");
  if (streak.count >= 7) markStamp("login7");
}

function renderStamps() {
  const data = getStampData();
  const seen = getSeenStamps();
  const grid = document.getElementById("stampGrid");
  grid.innerHTML = "";
  let doneCount = 0;
  const newlyAchieved = [];

  stampMissions.forEach(m => {
    const done = !!data[m.id];
    if (done) doneCount++;

    const cell = document.createElement("div");
    cell.className = "stamp-cell" + (done ? " done" : "");
    cell.innerHTML = `
      <img src="${m.img}" class="stamp-img" alt="${m.name}">
      <div class="stamp-name">${m.name}</div>
    `;
    grid.appendChild(cell);

    if (done && !seen[m.id]) {
      newlyAchieved.push({ id: m.id, cell });
    }
  });

  document.getElementById("stampProgress").textContent = `${doneCount} / ${stampMissions.length} 個達成`;

  // 新しく達成したスタンプは、スクロールしてマスが画面に入ってきたタイミングで演出＋SEを再生する
  if (newlyAchieved.length > 0) {
    observeStampReveal(newlyAchieved);
  }
}

function playStampSequence(items) {
  items.forEach((item, i) => {
    setTimeout(() => {
      item.cell.classList.add("stamp-anim");
      playStampSE();
      markStampSeen(item.id);
    }, i * 400);
  });
}

function observeStampReveal(items) {
  const grid = document.getElementById("stampGrid");
  if (!grid || !("IntersectionObserver" in window)) {
    // 古いブラウザ等でIntersectionObserverが使えない場合はそのまま再生
    playStampSequence(items);
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        playStampSequence(items);
        observer.disconnect();
      }
    });
  }, { threshold: 0.4 });
  observer.observe(grid);
}

initStampSeenIfNeeded();
updateLoginStamp();
renderStamps();

// ===== ミッション表示 =====
function renderMissions() {
  const today = new Date().toDateString();
  const data = JSON.parse(localStorage.getItem("mission")) || {};
  const isToday = data.date === today;

  const missions = [
    {
      name: "ログインする",
      done: isToday && data.login,
      reward: "達成条件の一つ"
    },
    {
      name: "ガチャを1回引く",
      done: isToday && data.gacha,
      reward: "達成条件の一つ"
    },
    {
      name: "バトルに1回勝利する",
      done: isToday && data.battle,
      reward: "達成条件の一つ"
    },
    {
      name: "ミッション達成報酬",
      done: isToday && data.rewarded,
      reward: "願いの短冊 +20枚（ログイン＋ガチャorバトル勝利）"
    },
  ];

  const list = document.getElementById("missionList");
  list.innerHTML = "";
  missions.forEach(m => {
    const div = document.createElement("div");
    div.className = "mission-item";
    div.innerHTML = `
      <div>
        <div class="mission-name">${m.name}</div>
        <div class="mission-reward">${m.reward}</div>
      </div>
      <span class="mission-status ${m.done ? 'done' : 'yet'}">${m.done ? '達成' : '未達成'}</span>
    `;
    list.appendChild(div);
  });
}

// ===== イベント表示 =====
// ここにイベントを追加していく
const events = [
  {
    tag: "gacha",
    tagLabel: "期間限定ガチャ",
    title: "実装予定",
    period: "coming soon"
  },
  {
    tag: "event",
    tagLabel: "期間限定イベント",
    title: "実装予定",
    period: "coming soon"
  },
];

function renderEvents() {
  const list = document.getElementById("eventList");
  list.innerHTML = "";
  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event-item";
    div.innerHTML = `
      <span class="event-tag tag-${e.tag}">${e.tagLabel}</span>
      <div class="event-title">${e.title}</div>
      <div class="event-period">${e.period}</div>
    `;
    list.appendChild(div);
  });
}

renderMissions();
renderEvents();


</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字変 - ガチャ</title>
<style>
body{
    margin:0;
    overflow:hidden;
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle at top,#ffffff 0%,#ffffff 50%,#ff8640 100%);
    font-family:sans-serif;
    padding-bottom:130px;
}

/* 恒常ガチャタイトル */
#gachaTitle{
    font-size:22px;
    font-weight:bold;
    color:#4b0000;
    letter-spacing:4px;
    margin-bottom:8px;
    z-index:3;
}

/* カメラ（ぷにっとボタン） */
#camera{
    width:400px;
    z-index:3;
    cursor:pointer;
    transition:transform 0.1s;
    user-select:none;
}
#camera:active{
    transform:scale(0.88);
}

.gacha-btns{
    margin-top:16px;
    display:flex;
    gap:16px;
    z-index:3;
}
.gachaBtn{
    width:200px;
    height:60px;
    border:none;
    border-radius:15px;
    background:#4b0000;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 4px 0 #2a0000;
    transition:.1s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    line-height:1.3;
}
.gachaBtn:active{ transform:scale(.9); }
.gachaBtn:disabled{ opacity:.4; cursor:not-allowed; }
.gachaBtn .cost{ font-size:13px; color:#ffaa88; }
.kanji{
    position:absolute;
    font-size:42px;
    font-weight:bold;
    color:#4b0000;
    pointer-events:none;
    z-index:4;
}
#flash{
    position:fixed;
    width:100%;height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:50;
}
#card{
    position:absolute;
    width:280px;
    opacity:0;
    transform:scale(.2);
    z-index:40;
}
#rare{
    position:absolute;
    top:100px;
    font-size:70px;
    font-weight:bold;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
    background-size:300%;
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:prism 2s linear infinite;
    opacity:0;
    z-index:45;
}
@keyframes prism{ 0%{background-position:0%} 100%{background-position:300%} }
#resultScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,.7);
    z-index:100;
}
#aura{
    position:absolute;
    width:700px;height:700px;
    border-radius:50%;
    opacity:0;
    z-index:35;
}
.ssrAura{
    background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(255,255,255,.8) 30%,rgba(255,255,255,0) 100%);
    filter:blur(30px);
    animation:ssrPulse 2s ease-in-out infinite;
}
@keyframes ssrPulse{ 0%{transform:scale(.9)} 50%{transform:scale(1.1)} 100%{transform:scale(.9)} }
.urAura{
    background:conic-gradient(red,orange,yellow,lime,cyan,blue,violet,red);
    filter:blur(80px);
    animation:urSpin 8s linear infinite,urPulse 2s ease-in-out infinite;
}
@keyframes urSpin{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes urPulse{ 0%{scale:.9} 50%{scale:1.1} 100%{scale:.9} }
#resultButtons{
    margin-top:350px;
    display:flex;
    gap:20px;
    z-index:200;
}
#againBtn,#backBtn{
    width:180px;height:50px;
    border:none;border-radius:15px;
    font-size:20px;
    cursor:pointer;
}
#againBtn{ background:#ff8640; color:white; }
#backBtn{ background:#333; color:white; }
#statusBox{
    position:fixed;
    top:16px;left:16px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:999;
}
.status-item{
    background:white;
    padding:8px 18px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    display:flex;
    align-items:center;
    gap:6px;
}
.status-item img{ height:28px; width:auto; }
#toast{
    position:fixed;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.8);
    color:white;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    opacity:0;
    pointer-events:none;
    z-index:9999;
    transition:opacity .3s;
}
.bottom-nav{
    position:fixed;left:0;bottom:0;
    width:100%;height:110px;
    background:#5b0000;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:1000;
}
.nav-btn{ width:70px; cursor:pointer; transition:0.08s; }
.nav-btn:active{ transform:scale(0.88); }
.setting-btn{
    position:fixed;
    left:10px;
    bottom:140px;
    width:100px;
    height:100px;
    cursor:pointer;
    transition:0.08s;
    background:none;
    border:none;
    line-height:1;
    z-index:1100;
}
.setting-btn:active{ transform:scale(0.88); }
</style>
</head>
<body>

<div id="resultScreen">
    <div id="rare"></div>
    <div id="aura"></div>
    <img id="card">
    <div id="resultButtons">
        <button id="againBtn">もう一度引く</button>
        <button id="backBtn">戻る</button>
    </div>
</div>

<div id="flash"></div>

<!-- 恒常ガチャタイトル -->
<div id="gachaTitle">恒常ガチャ</div>

<!-- カメラ：押すと1回ガチャ -->
<img src="images/camera.png" id="camera" onclick="startGacha(1)" title="タップで1回ガチャ！">

<!-- ガチャボタン -->
<div class="gacha-btns">
    <button class="gachaBtn" id="gacha1Btn" onclick="startGacha(1)">
        1回ガチャ
        <span class="cost">願いの短冊 20枚</span>
    </button>
    <button class="gachaBtn" id="gacha10Btn" onclick="startGacha(10)">
        10連ガチャ
        <span class="cost">願いの短冊 200枚</span>
    </button>
</div>

<div id="statusBox">
    <div class="status-item">
        <img src="images/願いの短冊.png" alt="短冊">
        <span id="tanzakuText">0</span>枚
    </div>
    <div class="status-item">Pt: <span id="pointText">0</span></div>
</div>

<div id="toast"></div>

<img src="images/book.png" width="90"
    onclick="location.href='zukan.html'"
    style="cursor:pointer;position:fixed;right:20px;top:80px;z-index:999;transition:.2s;"
    onmouseover="this.style.transform='scale(1.1)'"
    onmouseout="this.style.transform='scale(1)'">

<img src="images/shop_logo.png" width="75"
    onclick="location.href='shop.html'"
    style="cursor:pointer;position:fixed;right:20px;top:190px;z-index:999;transition:.2s;"
    onmouseover="this.style.transform='scale(1.1)'"
    onmouseout="this.style.transform='scale(1)'">

<script src="js/cards.js"></script>
<script>

const kanjis = ["火","水","木","金","土","風","雷","氷","炎","森","光","闇","剣","変"];

let currentGachaCount = 1;
let gachaResults = [];
let gachaIndex = 0;

function getTanzaku(){ return parseInt(localStorage.getItem("tanzaku")) || 0; }
function setTanzaku(v){ localStorage.setItem("tanzaku", v); updateStatus(); }
function getPoints(){ return parseInt(localStorage.getItem("points")) || 0; }
function setPoints(v){ localStorage.setItem("points", v); updateStatus(); }

function updateStatus(){
    document.getElementById("tanzakuText").textContent = getTanzaku();
    document.getElementById("pointText").textContent = getPoints();
}

function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.color = "white";
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
}

function checkMissionGacha(){
    const today = new Date().toDateString();
    const data = JSON.parse(localStorage.getItem("mission")) || {};
    if(data.date !== today) return;
    if(data.login && !data.gacha){
        data.gacha = true;
        localStorage.setItem("mission", JSON.stringify(data));
        if(data.login && (data.gacha || data.battle)){
            grantMissionReward(data);
        }
    }
}

function grantMissionReward(data){
    if(data.rewarded) return;
    data.rewarded = true;
    localStorage.setItem("mission", JSON.stringify(data));
    setTanzaku(getTanzaku() + 20);
    showToast("ミッション達成！願いの短冊+20枚");
}

function startGacha(count){
    const cost = count === 1 ? 20 : 200;
    if(getTanzaku() < cost){
        showToast(`願いの短冊が足りません（必要: ${cost}枚）`);
        return;
    }
    setTanzaku(getTanzaku() - cost);
    currentGachaCount = count;
    gachaResults = [];
    gachaIndex = 0;
    for(let i = 0; i < count; i++){
        gachaResults.push(drawOneCard());
    }
    checkMissionGacha();
    document.querySelectorAll(".gachaBtn").forEach(b => b.disabled = true);
    document.getElementById("camera").style.pointerEvents = "none";
    spawnKanji();
}

function drawOneCard(){
    const r = Math.random();
    const urCards  = cards.filter(c => c.rarity === "UR");
    const ssrCards = cards.filter(c => c.rarity === "SSR");
    const nCards   = cards.filter(c => c.rarity === "N");
    let selected;
    if(r < 0.1)      selected = urCards[Math.floor(Math.random()*urCards.length)];
    else if(r < 0.4) selected = ssrCards[Math.floor(Math.random()*ssrCards.length)];
    else             selected = nCards[Math.floor(Math.random()*nCards.length)];
    saveCard(selected);
    setPoints(getPoints() + 10);
    return selected;
}

function saveCard(card){
    let ownedCards = JSON.parse(localStorage.getItem("ownedCards")) || [];
    const alreadyOwned = ownedCards.some(o => o.name === card.name);
    if(!alreadyOwned){
        localStorage.setItem("new_" + card.name, "true");
        ownedCards.push(card);
        localStorage.setItem("ownedCards", JSON.stringify(ownedCards));
    }
}

function spawnKanji(){
    for(let i = 0; i < 25; i++){
        const k = document.createElement("div");
        k.className = "kanji";
        k.innerText = kanjis[Math.floor(Math.random()*kanjis.length)];
        document.body.appendChild(k);
        const startX = Math.random()*window.innerWidth;
        const startY = Math.random()*window.innerHeight;
        k.style.left = startX+"px";
        k.style.top  = startY+"px";
        setTimeout(()=>{
            k.animate([
                {left:startX+"px",top:startY+"px",opacity:1},
                {left:(window.innerWidth/2)+"px",top:(window.innerHeight/2-100)+"px",opacity:1}
            ],{duration:1200,fill:"forwards",easing:"ease-in"});
        },50);
        setTimeout(()=>k.remove(),1400);
    }
    setTimeout(shoot,1500);
}

function shoot(){
    document.body.animate([
        {transform:"translateX(-5px)"},{transform:"translateX(5px)"},
        {transform:"translateX(-5px)"},{transform:"translateX(0px)"}
    ],{duration:250});
    const flash = document.getElementById("flash");
    flash.animate([{opacity:0},{opacity:1},{opacity:0}],{duration:400,fill:"forwards"});
    setTimeout(showCard,300);
}

function showCard(){
    const selected = gachaResults[gachaIndex];
    const card = document.getElementById("card");
    const rare = document.getElementById("rare");
    const aura = document.getElementById("aura");
    aura.className = "";
    card.style.boxShadow = "none";

    if(selected.rarity === "SSR"){
        aura.classList.add("ssrAura");
        aura.style.opacity = "1";
        card.style.boxShadow = "0 0 30px white, 0 0 80px white";
    } else if(selected.rarity === "UR"){
        aura.classList.add("urAura");
        aura.style.opacity = "1";
        card.style.boxShadow = "0 0 30px gold, 0 0 80px orange";
    } else {
        aura.style.opacity = "0";
    }

    card.src = "images/genshokugensho_cards/" + selected.image;
    rare.innerText = selected.rarity;
    rare.style.opacity = "1";

    card.animate([
        {opacity:0,transform:"scale(.2) rotateY(180deg)"},
        {opacity:1,transform:"scale(1) rotateY(0deg)"}
    ],{duration:800,fill:"forwards"});

    document.getElementById("resultScreen").style.display = "flex";

    if(currentGachaCount > 1 && gachaIndex < gachaResults.length - 1){
        document.getElementById("againBtn").textContent = "次へ";
    } else {
        document.getElementById("againBtn").textContent = "もう一度引く";
    }

    document.querySelectorAll(".gachaBtn").forEach(b => b.disabled = false);
    document.getElementById("camera").style.pointerEvents = "auto";
}

document.getElementById("againBtn").onclick = function(){
    if(currentGachaCount > 1 && gachaIndex < gachaResults.length - 1){
        gachaIndex++;
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("card").style.opacity = "0";
        document.getElementById("rare").style.opacity = "0";
        setTimeout(showCard, 200);
    } else {
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("card").style.opacity = "0";
        document.getElementById("rare").style.opacity = "0";
        startGacha(1);
    }
};

document.getElementById("backBtn").onclick = function(){
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("card").style.opacity = "0";
    document.getElementById("rare").style.opacity = "0";
    document.getElementById("aura").style.opacity = "0";
};

function checkLogin(){
    const today = new Date().toDateString();
    const data = JSON.parse(localStorage.getItem("mission")) || {};
    if(data.date !== today){
        const newData = { date: today, login: true, gacha: false, battle: false, rewarded: false };
        localStorage.setItem("mission", JSON.stringify(newData));
        setTanzaku(getTanzaku() + 20);
        showToast("ログインボーナス！願いの短冊+20枚");
    } else if(!data.login){
        data.login = true;
        localStorage.setItem("mission", JSON.stringify(data));
    }
}

updateStatus();
checkLogin();

</script>

<div class="bottom-nav">
    <img src="images/btn_home.png"  class="nav-btn" onclick="location.href='home.html'">
    <img src="images/btn_gacha.png" class="nav-btn" onclick="location.href='gacha.html'">
    <img src="images/btn_deck.png"  class="nav-btn" onclick="location.href='deck.html'">
    <img src="images/btn_battle.png"class="nav-btn" onclick="location.href='battle select.html'">
</div>
<img src="images/歯車.png" class="setting-btn"
onclick="location.href='setting.html'"
style="filter:brightness(0);">

</body>
</html>

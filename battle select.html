<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字変 - バトル選択</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; overflow-x: hidden; font-family: sans-serif; }
.bg {
  position: fixed; inset: 0;
  background: radial-gradient(circle at top, #ffffff 0%, #ffffff 50%, #ff8640 100%);
  z-index: 0;
}
.container {
  position: relative; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding-bottom: 140px; gap: 40px;
}
h1 { font-size: 36px; font-weight: bold; color: #4b0000; letter-spacing: 6px; text-shadow: 1px 1px 0 rgba(255,255,255,0.6); }
.btn-group { display: flex; flex-direction: column; gap: 24px; width: 85%; max-width: 400px; }
.select-btn {
  width: 100%; height: 100px; font-size: 28px; font-weight: bold;
  letter-spacing: 6px; border: none; border-radius: 20px; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 6px 0 rgba(0,0,0,0.25);
}
.select-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
.btn-tutorial { background: #fff; color: #4b0000; border: 3px solid #4b0000; }
.btn-jissen { background: #4b0000; color: #fff; }
.btn-event {
  background: linear-gradient(135deg, #b8860b, #ffd700, #b8860b);
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  animation: eventGlow 2s ease-in-out infinite;
}
@keyframes eventGlow {
  0%   { box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 0 10px rgba(255,215,0,0.4); }
  50%  { box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 0 25px rgba(255,215,0,0.8); }
  100% { box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 0 10px rgba(255,215,0,0.4); }
}
.btn-sub { font-size: 14px; letter-spacing: 2px; color: inherit; opacity: 0.7; display: block; margin-top: 4px; }
.bottom-nav {
  position: fixed; left: 0; bottom: 0;
  width: 100%; height: 110px; background: #5b0000;
  display: flex; justify-content: space-around; align-items: center; z-index: 100;
}
.nav-btn { width: 70px; cursor: pointer; transition: 0.08s; }
.nav-btn:active { transform: scale(0.88); }
.setting-btn{
    position:fixed;
    left:10px;
    bottom:140px;
    width:100px;
    height:100px;
    cursor:pointer;
    transition:0.08s;
    background:none;
    border:none;
    line-height:1;
    z-index:1100;
}
.setting-btn:active{ transform:scale(0.88); }
</style>
</head>
<body>
<audio id="bgm" src="audio/bgm_main.mp3" loop></audio>
<div class="bg"></div>

<div class="container">
  <h1>バトル</h1>
  <div class="btn-group">
    <button class="select-btn btn-event" onclick="location.href='event_battle.html'">
      イベント
      <span class="btn-sub">期間限定イベントバトル</span>
    </button>
    <button class="select-btn btn-tutorial" onclick="location.href='tutorialBattle.html'">
      チュートリアル
      <span class="btn-sub">ルールを学ぶ</span>
    </button>
    <button class="select-btn btn-jissen" onclick="location.href='difficulty.html'">
      実　践
      <span class="btn-sub">CPUと対戦する</span>
    </button>
  </div>
</div>

<div class="bottom-nav">
  <img src="images/btn_home.png"   class="nav-btn" onclick="location.href='home.html'">
  <img src="images/btn_gacha.png"  class="nav-btn" onclick="location.href='gacha.html'">
  <img src="images/btn_deck.png"   class="nav-btn" onclick="location.href='deck.html'">
  <img src="images/btn_battle.png" class="nav-btn" onclick="location.href='battle select.html'">
</div>

<img src="images/歯車.png" class="setting-btn" onclick="location.href='setting.html'">

<script>
// ===== BGM再生 =====
const bgmEl = document.getElementById('bgm');
if (bgmEl) {
  const savedVol = localStorage.getItem('vol_bgm');
  bgmEl.volume = (savedVol !== null ? savedVol : 80) / 100;

  // ブラウザの自動再生ブロック対策：最初のタップ/クリックで再生開始
  const tryPlayBgm = () => {
    bgmEl.play().catch(() => {});
    document.removeEventListener('click', tryPlayBgm);
    document.removeEventListener('touchstart', tryPlayBgm);
  };
  document.addEventListener('click', tryPlayBgm, { once: true });
  document.addEventListener('touchstart', tryPlayBgm, { once: true });
}
</script>

</body>
</html>

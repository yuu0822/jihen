<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon.png">
<meta name="theme-color" content="#5b0000">
<style>
   * { box-sizing: border-box; }
   body{
    margin:0;
    padding:20px;
    background-image:url("images/zukan_background.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    font-family:sans-serif;
    text-align:center;
    padding-bottom:140px;
}
.bottom-nav{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:110px;
  background:#5b0000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:100;
}
.nav-btn{ width:70px; cursor:pointer; transition:0.08s; }
.nav-btn:active{ transform:scale(0.88); }
.setting-btn{
    position:fixed;
    left:10px;
    bottom:140px;
    width:100px;
    height:100px;
    cursor:pointer;
    transition:0.08s;
    background:none;
    border:none;
    line-height:1;
    z-index:9999;
}
.setting-btn:active{ transform:scale(0.88); }

/* ===== タブ ===== */
.tab-row{ display:flex; justify-content:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.tab-btn{
    padding:10px 20px; border:none; border-radius:16px; font-size:15px; font-weight:bold;
    background:rgba(255,255,255,0.5); color:#4b0000; cursor:pointer; transition:.12s;
    display:inline-flex; align-items:center; gap:6px;
}
.tab-btn.active{ background:#4b0000; color:#fff; box-shadow:0 3px 8px rgba(0,0,0,0.3); }
.tab-btn:active{ transform:scale(0.95); }
.tab-icon{ width:20px; height:20px; object-fit:contain; vertical-align:middle; }
.panel{ display:none; }
.panel.active{ display:block; }

#cardList{ display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
#searchArea{ margin-bottom:20px; }
#searchBox{
    width:300px; height:50px; font-size:20px;
    border:3px solid #6d5208; border-radius:25px; text-align:center;
}
#searchBtn{
    width:80px; height:50px; margin-left:10px; border:none;
    border-radius:15px; background:#6d5208; color:white; font-size:18px;
    cursor:pointer; transition:.1s;
}
#searchBtn:active{ transform:scale(.92); }
#cardList{
    display:grid;
    grid-template-columns:repeat(3, 1fr); 
    gap:20px;
    justify-items:center;
    max-width:420px;                      
    margin:auto;
}
#deckCount{ font-size:28px; font-weight:bold; color:#4b0000; margin-bottom:20px; }
#deckArea{
    display:grid;
    grid-template-columns:repeat(3, 1fr); 
    gap:10px;
    max-width:500px;                      
    margin:20px auto;
}
.deckSlot{
    width:120px; height:170px;
    border:3px dashed gray;
    border-radius:10px;
    background:rgba(255,255,255,.4);
}
#deckModeNotice{ display:none; font-size:13px; color:#a33; background:rgba(255,255,255,0.7); padding:6px 14px; border-radius:10px; margin-bottom:14px; }

/* ===== 貸し出しデッキタブ ===== */
#rentalStatus{ font-size:16px; font-weight:bold; color:#4b0000; margin-bottom:14px; }
#rentalDeckArea{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    max-width:500px;
    margin:20px auto;
}
#rentalDeckArea .deckSlot{ border-style:solid; border-color:#ffcc00; background:rgba(255,255,255,0.5); }
#rentalDeckArea .deckSlot img{ width:100%; border-radius:8px; }
.rental-toggle-btn{
    width:240px; height:56px; font-size:17px; font-weight:bold;
    background:#4b0000; color:#fff; border:none; border-radius:16px; cursor:pointer; margin-top:10px;
}
.rental-toggle-btn:active{ transform:scale(0.96); }

/* ===== スキン・背景タブ ===== */
.customize-note{ font-size:13px; color:#5b3a10; background:rgba(255,255,255,0.55); display:inline-block; padding:6px 16px; border-radius:12px; margin-bottom:20px; }
.sub-tab-row{ display:flex; justify-content:center; gap:8px; margin-bottom:18px; }
.sub-tab-btn{
    padding:8px 18px; border:none; border-radius:14px; font-size:14px; font-weight:bold;
    background:rgba(255,255,255,0.4); color:#4b0000; cursor:pointer; transition:.12s;
}
.sub-tab-btn.active{ background:#6d5208; color:#fff; }
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
    gap:16px;
    max-width:500px;
    margin:0 auto;
}
.item-card{
    background:rgba(255,255,255,0.55);
    border:3px solid transparent;
    border-radius:16px;
    padding:10px;
    cursor:pointer;
    transition:.12s;
}
.item-card:active{ transform:scale(0.96); }
.item-card.selected{ border-color:#ffcc00; box-shadow:0 0 14px rgba(255,204,0,0.7); background:rgba(255,255,255,0.85); }
.item-card img{
    width:100%;
    aspect-ratio: 3/4;
    object-fit:cover;
    border-radius:10px;
    background:#ccc;
}
.item-card .item-name{ margin-top:8px; font-size:13px; font-weight:bold; color:#4b0000; }
.item-card .badge{
    display:inline-block; margin-top:4px; font-size:11px; padding:2px 10px; border-radius:8px;
    background:#4b0000; color:#fff;
}
.item-card.selected .badge{ background:#ffcc00; color:#4b0000; }
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編成</title>
</head>
<body>
<audio id="bgm" src="audio/bgm_main.mp3" loop></audio>
<h1>編成画面</h1>

<div class="tab-row">
  <button class="tab-btn active" id="tabDeck" onclick="switchMainTab('deck')">デッキ編成</button>
  <button class="tab-btn" id="tabRental" onclick="switchMainTab('rental')">
    <img src="images/icon_rental_deck.png" class="tab-icon" onerror="this.style.display='none'">🎁 貸し出しデッキ
  </button>
  <button class="tab-btn" id="tabCustomize" onclick="switchMainTab('customize')">スキン・背景</button>
</div>

<!-- ===== デッキ編成パネル ===== -->
<div class="panel active" id="panelDeck">

<div id="deckModeNotice"></div>
<div id="deckCount">デッキ 0 / 12</div>

<div id="deckArea"></div>

<button onclick="kakutei()" style="
  width:200px; height:60px; font-size:24px;
  background:#4b0000; color:white; border:none;
  border-radius:15px; cursor:pointer; margin:20px;
">確定</button>

<div id="searchArea">
<input id="searchBox" type="text" placeholder="カード名を検索">
<select id="typeFilter">
<option value="">全属性</option>
<option value="○">○属性</option>
<option value="□">□属性</option>
<option value="△">△属性</option>
</select>
<select id="rarityFilter">
<option value="">全レア</option>
<option value="UR">UR</option>
<option value="SSR">SSR</option>
<option value="N">N</option>
</select>
<button id="searchBtn">検索</button>
</div>

<div id="cardList"></div>

</div>

<!-- ===== 貸し出しデッキパネル ===== -->
<div class="panel" id="panelRental">
  <div class="customize-note">
    <img src="images/icon_rental_deck.png" class="tab-icon" onerror="this.style.display='none'">
    🎁 貸し出しデッキは、カードを持っていなくてもすぐバトルに挑戦できるお試し用の完成デッキです（無料）
  </div>
  <div id="rentalStatus"></div>
  <div id="rentalDeckArea"></div>
  <button class="rental-toggle-btn" id="rentalToggleBtn" onclick="toggleRentalDeck()"></button>
</div>

<!-- ===== スキン・背景パネル ===== -->
<div class="panel" id="panelCustomize">
  <div class="customize-note">現在は全て無料でお試しいただけます（今後、ガチャや短冊での入手アイテムを追加予定です）</div>
  <div class="sub-tab-row">
    <button class="sub-tab-btn active" id="subTabTheme" onclick="switchCustomizeTab('theme')">背景テーマ</button>
    <button class="sub-tab-btn" id="subTabSkin" onclick="switchCustomizeTab('skin')">カードスキン</button>
  </div>
  <div class="panel active" id="subPanelTheme">
    <div class="gallery" id="themeGallery"></div>
  </div>
  <div class="panel" id="subPanelSkin">
    <div class="gallery" id="skinGallery"></div>
  </div>
</div>

<script src="js/cards.js"></script>
<script src="js/audio.js"></script>

<script>

/* =========================================================
   貸し出しデッキ（レンタルデッキ）
   RENTAL_DECK_CARD_NAMES にちょうど12枚のカード名を指定すると、
   それが貸し出しデッキになります。
   空のままの場合は「Nレアのカードを名前順で12枚」を自動選出します
   （所持状況に関わらず、誰でも使えるお試し用の構成）。
   ========================================================= */
const RENTAL_DECK_CARD_NAMES = []; // 例: ["水","火","木","金", ... ] ちょうど12枚

function buildRentalDeck(){
  if(RENTAL_DECK_CARD_NAMES.length === 12){
    const picked = RENTAL_DECK_CARD_NAMES.map(n => cards.find(c => c.name === n)).filter(Boolean);
    if(picked.length === 12) return picked;
  }
  const sorted = [...cards].sort((a,b) => a.name.localeCompare(b.name, 'ja'));
  let pool = sorted.filter(c => c.rarity === "N");
  if(pool.length < 12) pool = pool.concat(sorted.filter(c => c.rarity === "SSR"));
  return pool.slice(0, 12);
}

const RENTAL_KEY = "useRentalDeck";

function isRentalActive(){
  return localStorage.getItem(RENTAL_KEY) === "true";
}

function toggleRentalDeck(){
  localStorage.setItem(RENTAL_KEY, isRentalActive() ? "false" : "true");
  renderRentalPanel();
  renderDeckModeNotice();
}

function renderRentalPanel(){
  const active = isRentalActive();
  document.getElementById("rentalStatus").textContent = active
    ? "現在、貸し出しデッキを使用中です"
    : "現在は自分のデッキを使用しています";
  document.getElementById("rentalToggleBtn").textContent = active
    ? "自分のデッキに戻す"
    : "このデッキを借りる";

  const area = document.getElementById("rentalDeckArea");
  area.innerHTML = "";
  buildRentalDeck().forEach(card => {
    const slot = document.createElement("div");
    slot.className = "deckSlot";
    const img = document.createElement("img");
    img.src = getCardSkinFolder() + card.image;
    slot.appendChild(img);
    area.appendChild(slot);
  });
}

function renderDeckModeNotice(){
  const notice = document.getElementById("deckModeNotice");
  if(isRentalActive()){
    notice.style.display = "inline-block";
    notice.textContent = "現在「貸し出しデッキ」使用中です。バトルにはこちらではなく貸し出しデッキが使われます。";
  } else {
    notice.style.display = "none";
  }
}

// ===== カードスキン・背景カスタマイズ =====
// customize.html と同じ定義・同じlocalStorageキーを使う。
// 新しいスキン／テーマを追加したい場合はここに1項目追加すればOK。
const themes = [
  { id: "default", name: "初期背景", battleBg: "images/battle_field.png", subBg: "images/zukan_background.png", thumb: "images/battle_field.png" },
  { id: "sakura", name: "桜舞う戦場", battleBg: "images/backgrounds/sakura_battle.png", subBg: "images/backgrounds/sakura_zukan.png", thumb: "images/backgrounds/sakura_thumb.png" },
  { id: "night", name: "星降る夜", battleBg: "images/backgrounds/night_battle.png", subBg: "images/backgrounds/night_zukan.png", thumb: "images/backgrounds/night_thumb.png" }
];

const skins = [
  { id: "default", name: "通常スキン", folder: "images/genshokugensho_cards/", thumb: null },
  { id: "gold", name: "ゴールドスキン", folder: "images/skins/gold/", thumb: null },
  { id: "watercolor", name: "水彩スキン", folder: "images/skins/watercolor/", thumb: null }
];

const STORAGE_KEYS = {
  battleBg: "selectedBattleBg",
  zukanBg: "selectedZukanBg",
  themeId: "selectedThemeId",
  skinFolder: "selectedCardSkinFolder",
  skinId: "selectedCardSkinId"
};

function getCardSkinFolder(){
    return localStorage.getItem(STORAGE_KEYS.skinFolder) || "images/genshokugensho_cards/";
}
function applyCustomBackground(){
    const bg = localStorage.getItem(STORAGE_KEYS.zukanBg);
    if(bg){
        document.body.style.backgroundImage = `url("${bg}")`;
    }
}

function switchMainTab(tab){
  document.getElementById("panelDeck").classList.toggle("active", tab === "deck");
  document.getElementById("panelRental").classList.toggle("active", tab === "rental");
  document.getElementById("panelCustomize").classList.toggle("active", tab === "customize");
  document.getElementById("tabDeck").classList.toggle("active", tab === "deck");
  document.getElementById("tabRental").classList.toggle("active", tab === "rental");
  document.getElementById("tabCustomize").classList.toggle("active", tab === "customize");
  if(tab === "rental") renderRentalPanel();
}

function switchCustomizeTab(tab){
  document.getElementById("subPanelTheme").classList.toggle("active", tab === "theme");
  document.getElementById("subPanelSkin").classList.toggle("active", tab === "skin");
  document.getElementById("subTabTheme").classList.toggle("active", tab === "theme");
  document.getElementById("subTabSkin").classList.toggle("active", tab === "skin");
}

function selectTheme(theme){
  localStorage.setItem(STORAGE_KEYS.battleBg, theme.battleBg);
  localStorage.setItem(STORAGE_KEYS.zukanBg, theme.subBg);
  localStorage.setItem(STORAGE_KEYS.themeId, theme.id);
  applyCustomBackground();
  renderThemeGallery();
}

function selectSkin(skin){
  localStorage.setItem(STORAGE_KEYS.skinFolder, skin.folder);
  localStorage.setItem(STORAGE_KEYS.skinId, skin.id);
  renderSkinGallery();
  renderCards();
  renderDeck();
  if(document.getElementById("panelRental").classList.contains("active")) renderRentalPanel();
}

function renderThemeGallery(){
  const currentId = localStorage.getItem(STORAGE_KEYS.themeId) || "default";
  const gallery = document.getElementById("themeGallery");
  gallery.innerHTML = "";
  themes.forEach(theme => {
    const card = document.createElement("div");
    card.className = "item-card" + (theme.id === currentId ? " selected" : "");
    card.onclick = () => selectTheme(theme);
    const img = document.createElement("img");
    img.src = theme.thumb;
    img.onerror = () => { img.style.opacity = "0.25"; };
    const name = document.createElement("div");
    name.className = "item-name";
    name.textContent = theme.name;
    card.appendChild(img);
    card.appendChild(name);
    if(theme.id === currentId){
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = "使用中";
      card.appendChild(badge);
    }
    gallery.appendChild(card);
  });
}

function renderSkinGallery(){
  const currentId = localStorage.getItem(STORAGE_KEYS.skinId) || "default";
  const gallery = document.getElementById("skinGallery");
  gallery.innerHTML = "";
  skins.forEach(skin => {
    const card = document.createElement("div");
    card.className = "item-card" + (skin.id === currentId ? " selected" : "");
    card.onclick = () => selectSkin(skin);
    const img = document.createElement("img");
    if(skin.thumb){
      img.src = skin.thumb;
    } else if(ownedCards.length > 0){
      img.src = skin.folder + ownedCards[0].image;
    } else if(typeof cards !== "undefined" && cards.length > 0){
      img.src = skin.folder + cards[0].image;
    }
    img.onerror = () => { img.style.opacity = "0.25"; };
    const name = document.createElement("div");
    name.className = "item-name";
    name.textContent = skin.name;
    card.appendChild(img);
    card.appendChild(name);
    if(skin.id === currentId){
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = "使用中";
      card.appendChild(badge);
    }
    gallery.appendChild(card);
  });
}

// ===== スタンプラリー連携 =====
// 新規達成時のみ短冊+20枚（全達成なら+500枚も追加）を付与する。
// このブロックは home.html / gacha.html / deck.html / battle.html / setting.html で共通。
function markStamp(id){
    const data = JSON.parse(localStorage.getItem("stampRally")) || {};
    if(!data[id]){
        data[id] = true;
        localStorage.setItem("stampRally", JSON.stringify(data));
        grantStampReward(data);
    }
}

function grantStampReward(data){
    const t = parseInt(localStorage.getItem("tanzaku")) || 0;
    localStorage.setItem("tanzaku", t + 20);
    showStampToast("スタンプ達成！ 願いの短冊+20枚");

    const allIds = ["login1","gacha1","login3","deckopen","deckmake","battle1","win1","setting1","login7"];
    const allDone = allIds.every(i => data[i]);
    if(allDone && localStorage.getItem("stampRallyCompleted") !== "true"){
        localStorage.setItem("stampRallyCompleted", "true");
        const t2 = parseInt(localStorage.getItem("tanzaku")) || 0;
        localStorage.setItem("tanzaku", t2 + 500);
        showStampToast("スタンプラリー全達成！ 願いの短冊+500枚");
    }
}

function showStampToast(msg){
    const t = document.createElement("div");
    t.textContent = msg;
    t.style.cssText = "position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:15px;font-weight:bold;z-index:9999;opacity:0;transition:opacity .3s;";
    document.body.appendChild(t);
    requestAnimationFrame(() => t.style.opacity = "1");
    setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 2200);
}

markStamp("deckopen"); // スタンプラリー：デッキ画面を開く
applyCustomBackground();

const ownedCards = JSON.parse(localStorage.getItem("ownedCards")) || [];
let deck = JSON.parse(localStorage.getItem("deck")) || [];
let selectedSlot = -1;
const cardList = document.getElementById("cardList");

document.getElementById("searchBox").addEventListener("keydown", function(event){
    if(event.key === "Enter") renderCards();
});

function renderCards(){
    cardList.innerHTML = "";
    const keyword = document.getElementById("searchBox").value;
    const selectedType = document.getElementById("typeFilter").value;
    const selectedRarity = document.getElementById("rarityFilter").value;
    ownedCards.forEach(card => {
        if(keyword && !card.name.includes(keyword)) return;
        if(selectedType && card.type !== selectedType) return;
        if(selectedRarity && card.rarity !== selectedRarity) return;
        const img = document.createElement("img");
        img.src = getCardSkinFolder() + card.image;
        img.style.width = "100px";
        if(deck.some(d => d.name === card.name)){
            img.style.border = "4px solid gold";
            img.style.borderRadius = "10px";
            img.style.boxShadow = "0 0 15px gold";
            img.style.opacity = "0.7";
        }
        img.onclick = () => {
            const index = deck.findIndex(c => c.name === card.name);
            if(index >= 0){
                deck.splice(index,1);
            } else {
                if(deck.length >= 12){ alert("デッキは12枚まで"); return; }
                deck.push(card);
            }
            localStorage.setItem("deck", JSON.stringify(deck));
            updateDeckCount();
            renderDeck();
            renderCards();
        };
        cardList.appendChild(img);
    });
}

document.getElementById("searchBtn").onclick = renderCards;
document.getElementById("typeFilter").onchange = renderCards;
document.getElementById("rarityFilter").onchange = renderCards;

function updateDeckCount(){
    document.getElementById("deckCount").innerText = `デッキ ${deck.length} / 12`;
}

function renderDeck(){
    const deckArea = document.getElementById("deckArea");
    deckArea.innerHTML = "";
    for(let i=0;i<12;i++){
        const slot = document.createElement("div");
        slot.className = "deckSlot";
        if(i === selectedSlot) slot.style.border = "4px solid gold";
        if(deck[i]){
            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";
            wrapper.style.width = "100%";
            wrapper.style.height = "100%";
            const img = document.createElement("img");
            img.src = getCardSkinFolder() + deck[i].image;
            img.style.width = "100%";
            const removeBtn = document.createElement("button");
            removeBtn.innerText = "✕";
            removeBtn.style.position = "absolute";
            removeBtn.style.top = "5px";
            removeBtn.style.right = "5px";
            removeBtn.style.width = "28px";
            removeBtn.style.height = "28px";
            removeBtn.style.border = "none";
            removeBtn.style.borderRadius = "50%";
            removeBtn.style.background = "red";
            removeBtn.style.color = "white";
            removeBtn.style.cursor = "pointer";
            removeBtn.onclick = (event) => {
                event.stopPropagation();
                deck.splice(i,1);
                localStorage.setItem("deck", JSON.stringify(deck));
                updateDeckCount();
                renderDeck();
                renderCards();
            };
            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            slot.appendChild(wrapper);
        }
        deckArea.appendChild(slot);
    }
}

renderCards();
updateDeckCount();
renderDeck();
renderThemeGallery();
renderSkinGallery();
renderDeckModeNotice();

function startBattle(){
    location.href = "battle select.html";
}

function kakutei(){
    if(deck.length < 12){ alert(`あと${12 - deck.length}枚必要です`); return; }
    markStamp("deckmake"); // スタンプラリー：デッキを編成する
    alert("デッキが完成しました！");
}
</script>

<div class="bottom-nav">
  <img src="images/btn_home.png"  class="nav-btn" onclick="location.href='home.html'">
  <img src="images/btn_gacha.png" class="nav-btn" onclick="location.href='gacha.html'">
  <img src="images/btn_deck.png"  class="nav-btn" onclick="location.href='deck.html'">
  <img src="images/btn_battle.png" class="nav-btn" onclick="startBattle()">
</div>

<img src="images/歯車.png" class="setting-btn" onclick="location.href='setting.html'" style="filter:invert(1);">

</body>
</html>

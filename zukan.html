<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図鑑</title>

<style>

* {
    box-sizing: border-box;
}

body{

    margin:0;
    padding:20px;

    overflow-x:hidden;

    background-image:
    url("images/zukan_background.png");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    background-attachment:fixed;

    font-family:sans-serif;
    text-align:center;
}

h1{

    color:#4b0000;
    margin-bottom:30px;
}

/* カード一覧 */

#cardList{

    display:grid;

    grid-template-columns:
    repeat(5, 1fr);

    gap:20px;

    justify-items:center;

    max-width:900px;

    margin:auto;
}

/* 透明ポケット */

.pocket{

    background:
    rgba(255,255,255,.5);

    backdrop-filter:blur(3px);

    border:2px solid
    rgba(255,255,255,.5);

    border-radius:10px;

    padding:5px;

    position:relative;
width:100%;
aspect-ratio:2/3;
overflow:hidden;
}

.pocket:hover{

    transform:scale(1.05);
}

/* カード画像 */

.pocket img{

    position:absolute;

    width:100%;

    top:0;
    left:0;
}

/* 戻るボタン */

#homeBtn{

    margin-top:40px;

    width:220px;
    height:60px;

    border:none;
    border-radius:15px;

    background:#4b0000;
    color:white;

    font-size:22px;

    cursor:pointer;
}

#backBtn{
    position:fixed;
    top:20px;
    left:20px;

    width:60px;
    height:60px;

    border:none;
    border-radius:50%;

    font-size:30px;

    cursor:pointer;
}

#completion{
    margin-bottom:5px;
}

#bar{
    margin:0 auto 10px auto;
}

#barFill{
    background:
    linear-gradient(
        90deg,
        red,
        blue,
        green
    );
}

#bar{

    width:300px;
    height:25px;

    background:#333;

    border-radius:20px;

    overflow:hidden;

    margin:0 auto 10px auto;
}

#barFill{

    height:100%;

    width:0%;

    background:
    linear-gradient(
        90deg,
        red,
        blue,
        green
    );
}

#cardDetail{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    rgba(0,0,0,0.8);

    z-index:999;
}

#detailImg{

    width:300px;
    max-width:80vw;

    margin-top:50px;
}

#detailName{

    color:white;

    font-size:30px;

    margin-top:20px;
}

#detailType{

    color:white;

    font-size:24px;

    margin-top:10px;
}

#closeBtn{

    margin-top:25px;

    width:120px;
    height:50px;

    font-size:20px;

    border:none;

    border-radius:25px;

    background:#6d5208;
    color:white;

    cursor:pointer;

    transition:0.1s;
}

#closeBtn:active{

    transform:scale(0.92);

}

#searchBox{

    width:350px;
    height:55px;

    font-size:22px;

    border:3px solid #6d5208;

    border-radius:30px;

    background:
    rgba(255,255,255,.8);

    text-align:center;

    margin-bottom:15px;
}

#searchArea{

    margin-bottom:15px;
}

#searchBtn{

    width:80px;
    height:50px;

    margin-left:10px;

    border:none;

    border-radius:15px;

    background:#6d5208;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.1s;
}

#searchBtn:active{

    transform:scale(0.92);

}


#typeFilter,
#rarityFilter{

    height:50px;

    font-size:18px;

    border-radius:15px;

    margin-left:5px;
}

/* ===== スマホ向け：4列で収まるように調整 ===== */
@media (max-width: 768px) {
    body{ padding:10px; }
    h1{ font-size:22px; margin-bottom:16px; }

    #cardList{
        grid-template-columns: repeat(4, 1fr);
        gap:8px;
        max-width:100%;
        padding:0 4px;
    }

    #bar{ width:80vw; }

    #searchArea{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:6px;
    }
    #searchBox{ width:70vw; height:44px; font-size:16px; }
    #searchBtn{ width:60px; height:40px; font-size:14px; margin-left:0; }
    #typeFilter, #rarityFilter{ height:40px; font-size:14px; margin-left:0; }

    #backBtn{ width:44px; height:44px; font-size:22px; top:10px; left:10px; }
}

</style>
</head>

<body>

<button id="backBtn"
onclick="location.href__='gacha.html'">
←
</button>

    <h1>字変図鑑</h1>
<div id="completion"></div>

<div id="searchArea">

<input
id="searchBox"
type="text"
placeholder="カード名を検索">

<select id="typeFilter">

<option value="">全属性</option>
<option value="○">○属性</option>
<option value="□">□属性</option>
<option value="△">△属性</option>

</select>

<label>

<input
type="checkbox"
id="unownedOnly"
>

未所持のみ

</label>

<select id="rarityFilter">

<option value="">全レア</option>
<option value="UR">UR</option>
<option value="SSR">SSR</option>
<option value="N">N</option>

</select>

<button id="searchBtn">
検索
</button>

</div>

<div id="bar">
    <div id="barFill"></div>

</div>
<div id="cardList"></div>
<script src="js/cards.js"></script>

<script>

const searchBox =
document.getElementById(
    "searchBox"
);


const ownedCards =
JSON.parse(
    localStorage.getItem("ownedCards")
) || [];

const totalCards =
cards.length;

const ownedCount =
ownedCards.length;


const percent =
Math.floor(
    ownedCount / totalCards * 100
);

document.getElementById("barFill")
.style.width =
percent + "%";

document.getElementById("completion")
.innerText =
`図鑑達成率 ${ownedCount}/${totalCards} (${percent}%)`;

const cardList =
document.getElementById("cardList");

document
.getElementById("searchBox")
.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        renderCards();

    }

});

const sortedCards = [...cards].sort((a, b) => {

    const order = {
        "○": 1,
        "□": 2,
        "△": 3
    };

    return order[a.type] - order[b.type];

});


function renderCards(){

    cardList.innerHTML = "";

    const keyword =
    searchBox.value;

    const selectedType =
    document.getElementById(
        "typeFilter"
    ).value;

    const selectedRarity =
    document.getElementById(
        "rarityFilter"
    ).value;


    const unownedOnly =
document.getElementById(
    "unownedOnly"
).checked;

    sortedCards.forEach(card => {

        if(
            keyword &&
            !card.name.includes(keyword)
        ){
            return;
        }

        if(
            selectedType &&
            card.type !== selectedType
        ){
            return;
        }

        if(
            selectedRarity &&
            card.rarity !== selectedRarity
        ){
            return;
        }

        const isNew =
        localStorage.getItem(
            "new_" + card.name
        ) === "true";

        const isOwned =
        ownedCards.some(
            owned => owned.name === card.name
        );

        if(
    unownedOnly &&
    isOwned
){
    return;
}

        const pocket =
        document.createElement("div");

        pocket.className =
        "pocket";

        const cardImg =
        document.createElement("img");

        cardImg.src =
        "images/genshokugensho_cards/" +
        card.image;

        if(!isOwned){

            cardImg.style.filter =
            "brightness(0.3)";
        }

        const sleeve =
        document.createElement("img");

        sleeve.style.width =
        "100%";

        sleeve.style.height =
        "100%";

        sleeve.style.position =
        "absolute";

        sleeve.style.top =
        "0";

        sleeve.style.left =
        "0";

        sleeve.style.objectFit =
        "contain";

        if(card.type === "○"){
            sleeve.src =
            "images/pocket_red.png";
        }

        if(card.type === "□"){
            sleeve.src =
            "images/pocket_blue.png";
        }

        if(card.type === "△"){
            sleeve.src =
            "images/pocket_green.png";
        }

        sleeve.style.opacity =
        "0.7";

        const nameText =
        document.createElement("div");

        nameText.style.position =
        "absolute";

        nameText.style.bottom =
        "5px";

        nameText.style.width =
        "100%";

        nameText.style.textAlign =
        "center";

        nameText.style.fontWeight =
        "bold";

        if(isOwned){

            nameText.innerText =
            "No." +
            String(card.no).padStart(3,"0") +
            " " +
            card.name;

        }else{

            nameText.innerText =
            "？？？";
        }

        pocket.appendChild(cardImg);
        pocket.appendChild(sleeve);
        pocket.appendChild(nameText);

        if(isNew){

            const newLabel =
            document.createElement("div");

            newLabel.innerText =
            "NEW!";

            newLabel.style.position =
            "absolute";

            newLabel.style.top =
            "5px";

            newLabel.style.right =
            "5px";

            newLabel.style.background =
            "red";

            newLabel.style.color =
            "white";

            newLabel.style.padding =
            "3px 8px";

            newLabel.style.borderRadius =
            "10px";

            pocket.appendChild(
                newLabel
            );
        }

        if(isOwned){

            pocket.onclick = () => {

                showDetail(card);

                localStorage.removeItem(
                    "new_" + card.name
                );

            };

        }

        cardList.appendChild(
            pocket
        );

    });

}


document
.getElementById("searchBtn")
.onclick = renderCards;

document
.getElementById("typeFilter")
.onchange = renderCards;

document
.getElementById("rarityFilter")
.onchange = renderCards;

document
.getElementById("unownedOnly")
.onchange = renderCards;

renderCards();








function showDetail(card){

    document.getElementById(
        "cardDetail"
    ).style.display = "block";

    document.getElementById(
        "detailImg"
    ).src =
    "images/genshokugensho_cards/" +
    card.image;

   document.getElementById(
    "detailName"
).innerText =
"No." +
String(card.no).padStart(3,"0")
+
" " +
card.rarity +
" " +
card.name;

    document.getElementById(
    "detailType"
).innerText =
"属性：" + card.type;

}
function closeDetail(){

    document.getElementById(
        "cardDetail"
    ).style.display = "none";
}


   </script>

<div id="cardDetail">

    <img id="detailImg">

    <div id="detailName"></div>

    <div id="detailType"></div>

   
    <button id="closeBtn"
onclick="closeDetail()">
    閉じる
</button>

    
</div>

</body>
</html>

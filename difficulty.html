<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字変 - 難易度選択</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; overflow-x: hidden; font-family: sans-serif; }
.bg {
  position: fixed; inset: 0;
  background: radial-gradient(circle at top, #ffffff 0%, #ffffff 50%, #ff8640 100%);
  z-index: 0;
}
.container {
  position: relative; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding-bottom: 140px; gap: 30px;
}
h1 { font-size: 32px; font-weight: bold; color: #4b0000; letter-spacing: 6px; text-shadow: 1px 1px 0 rgba(255,255,255,0.6); }
.btn-group { display: flex; flex-direction: column; gap: 18px; width: 85%; max-width: 400px; }
.select-btn {
  width: 100%; height: 90px; font-size: 24px; font-weight: bold;
  letter-spacing: 4px; border: none; border-radius: 20px; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 6px 0 rgba(0,0,0,0.25); color: #fff;
}
.select-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
.btn-sub { font-size: 12px; letter-spacing: 2px; opacity: 0.8; display: block; margin-top: 4px; }
.btn-beginner  { background: #4a90a4; }
.btn-middle    { background: #6a9a3a; }
.btn-advanced  { background: #c07a20; }
.btn-master    { background: #8b0000; }
.bottom-nav {
  position: fixed; left: 0; bottom: 0;
  width: 100%; height: 110px; background: #5b0000;
  display: flex; justify-content: space-around; align-items: center; z-index: 100;
}
.nav-btn { width: 70px; cursor: pointer; transition: 0.08s; }
.nav-btn:active { transform: scale(0.88); }
.setting-btn{
    position:fixed;
    left:10px;
    bottom:140px;
    width:100px;
    height:100px;
    cursor:pointer;
    transition:0.08s;
    background:none;
    border:none;
    line-height:1;
    z-index:1100;
}
.setting-btn:active{ transform:scale(0.88); }
</style>
</head>
<body>
<audio id="bgm" src="audio/bgm_main.mp3" loop></audio>
<div class="bg"></div>

<div class="container">
  <h1>難易度選択</h1>
  <div class="btn-group">
    <button class="select-btn btn-beginner" onclick="startBattle('beginner')">
      下　級
      <span class="btn-sub">Nカードのみ</span>
    </button>
    <button class="select-btn btn-middle" onclick="startBattle('middle')">
      中　級
      <span class="btn-sub">N ＆ SSRカード</span>
    </button>
    <button class="select-btn btn-advanced" onclick="startBattle('advanced')">
      上　級
      <span class="btn-sub">全レア・たまに有利属性を選ぶ</span>
    </button>
    <button class="select-btn btn-master" onclick="startBattle('master')">
      最上級
      <span class="btn-sub">全力妨害・有利属性を積極選択</span>
    </button>
  </div>
</div>

<script>

  // ===== BGM再生 =====
const bgmEl = document.getElementById('bgm');
if (bgmEl) {
  const savedVol = localStorage.getItem('vol_bgm');
  bgmEl.volume = (savedVol !== null ? savedVol : 80) / 100;

  // ブラウザの自動再生ブロック対策：最初のタップ/クリックで再生開始
  const tryPlayBgm = () => {
    bgmEl.play().catch(() => {});
    document.removeEventListener('click', tryPlayBgm);
    document.removeEventListener('touchstart', tryPlayBgm);
  };
  document.addEventListener('click', tryPlayBgm, { once: true });
  document.addEventListener('touchstart', tryPlayBgm, { once: true });
}
function startBattle(difficulty) {
  localStorage.setItem("difficulty", difficulty);
  location.href = "battle.html";
}
</script>

<div class="bottom-nav">
  <img src="images/btn_home.png"   class="nav-btn" onclick="location.href='home.html'">
  <img src="images/btn_gacha.png"  class="nav-btn" onclick="location.href='gacha.html'">
  <img src="images/btn_deck.png"   class="nav-btn" onclick="location.href='deck.html'">
  <img src="images/btn_battle.png" class="nav-btn" onclick="location.href='battle select.html'">
</div>

<img src="images/歯車.png" class="setting-btn" onclick="location.href='setting.html'">
</body>
</html>
